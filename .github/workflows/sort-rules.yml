
name: Sort Domain Rules

on:
  push:
    branches:
      - main  # 监听 main 分支的提交，如果你使用其他分支，请修改这里

jobs:
  sort:
    runs-on: ubuntu-latest  # 选择运行的操作系统（Ubuntu）

    steps:
    - name: Checkout code
      uses: actions/checkout@v2  # 获取你的代码

    - name: Sort domains file
      run: |
        # 假设规则文件名是 direct.yaml，请替换成你实际的文件名
        sort -o direct.yaml direct.yaml  # 按字母顺序对规则文件进行排序

    - name: Commit sorted file
      run: |
        git config --global user.name "GitHub Actions"  # 配置 Git 用户名
        git config --global user.email "actions@github.com"  # 配置 Git 邮箱
        git add clash-rules.yaml  # 添加修改后的文件到暂存区
        git commit -m "Auto-sort domain rules"  # 提交排序后的文件
        git push  # 将更改推送到远程仓库

name: Sort Domain Rules by Region

on:
  push:
    branches:
      - main  # 监听 main 分支的提交

jobs:
  sort:
    runs-on: ubuntu-latest  # 在 Ubuntu 系统上运行

    steps:
    - name: Checkout code
      uses: actions/checkout@v2  # 获取最新的代码

    - name: Sort domains file by region
      run: |
        # 设置要处理的文件路径
        FILE_PATH="direct.yaml"  # 这是你原始的文件路径

        # 提取文件中的 payload: 部分，保留它不变
        awk '/payload:/ {print $0}' $FILE_PATH > sorted_temp.yaml
        
        # 提取并排序 #自定义 区域中的 DOMAIN 部分（按域名排序）
        # 这里提取出每个规则的 DOMAIN 字段（例如 DOMAIN-SUFFIX, DOMAIN），并按域名排序
        awk '/#自定义/ {f=1} f && /DOMAIN/ {print $0} f && !/#自定义/ {f=0}' $FILE_PATH | \
        sort -t',' -k2 >> sorted_temp.yaml  # 按域名（第二列）排序

        # 合并文件，将排序后的内容添加到 sorted_temp.yaml
        # 继续处理文件中剩余部分，并将排序结果写回 sorted_temp.yaml
        awk '!/#自定义/ && !/payload:/ {print $0}' $FILE_PATH >> sorted_temp.yaml

        # 将排序后的内容覆盖原始的 direct.yaml 文件
        mv sorted_temp.yaml $FILE_PATH

    - name: Commit sorted file
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 使用 git add . 来添加所有修改过的文件
        git add .  # 添加所有文件（包括 direct.yaml）
        
        git commit -m "Auto-sort domain rules by region"  # 提交修改后的文件
        
        # 使用 GITHUB_TOKEN 来授权推送更改
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
